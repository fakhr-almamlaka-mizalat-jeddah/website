<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة فخر المملكة للمظلات والسواتر بجدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0b0f19', surface: '#161d30', gold: '#f59e0b', goldHover: '#d97706' } } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background-color: #0b0f19; }</style>
</head>
<body class="text-gray-200 antialiased">
    <!-- المحتوى الخاص بك (كما هو في رسالتك السابقة) -->
    <!-- (تم حذف المحتوى هنا لضمان الاختصار، احتفظ بنفس المحتوى الذي أرسلته سابقاً) -->

    <script>
        // --- إدارة البيانات باستخدام localStorage ---

        let commentsData = JSON.parse(localStorage.getItem('comments')) || [
            { id: 1, name: "المهندس خالد البقمي", rating: "⭐⭐⭐⭐⭐", text: "شغل ممتاز جداً ومواعيد دقيقة..." },
            { id: 2, name: "مؤسسة أبو فهد للمقاولات", rating: "⭐⭐⭐⭐⭐", text: "قمنا بالتعاقد معهم لتنفيذ هناجر..." }
        ];

        function saveToStorage() {
            localStorage.setItem('comments', JSON.stringify(commentsData));
            localStorage.setItem('adData', JSON.stringify({
                title: document.getElementById('ad-title').innerText,
                desc: document.getElementById('ad-desc').innerText,
                img: document.getElementById('ad-img').src
            }));
        }

        window.onload = function() {
            // استرجاع الإعلان
            const savedAd = JSON.parse(localStorage.getItem('adData'));
            if (savedAd) {
                document.getElementById('ad-title').innerText = savedAd.title;
                document.getElementById('ad-desc').innerText = savedAd.desc;
                document.getElementById('ad-img').src = savedAd.img;
            }
            renderComments();
        };

        function renderComments() {
            const listContainer = document.getElementById('comments-list');
            listContainer.innerHTML = '';
            commentsData.forEach(item => {
                listContainer.insertAdjacentHTML('beforeend', `
                    <div class="bg-brand-surface/70 border border-gray-800 p-5 rounded-xl flex justify-between items-start gap-4">
                        <div><p class="font-bold text-white">${item.name}</p><p class="text-xs text-gray-400">${item.text}</p></div>
                        <button onclick="deleteComment(${item.id})" class="text-red-400 text-[10px]">حذف 🗑️</button>
                    </div>`);
            });
        }

        function addComment() {
            // ... (نفس منطقك مع إضافة saveToStorage() بعد التعديل)
            saveToStorage();
            renderComments();
        }

        function deleteComment(id) {
            commentsData = commentsData.filter(item => item.id !== id);
            saveToStorage();
            renderComments();
        }
        
        function updateAdFromAdmin() {
            // ... (نفس منطقك مع إضافة saveToStorage() بعد التعديل)
            saveToStorage();
            toggleAdminModal();
        }
    </script>
</body>
</html>
